<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Products | MR BD Pulse Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <main class="main-content">
        <div class="products-header">
            <h1>Our Products</h1>
            <p>Browse our collection of authentic iPhones and accessories</p>
        </div>

        <!-- Search and Filter -->
        <div class="products-controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search products...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="iphone">iPhones</button>
                <button class="filter-btn" data-filter="accessory">Accessories</button>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="all-products">
            <!-- Products will be loaded here -->
        </div>

        <!-- Loading Spinner -->
        <div class="loading-spinner" id="loadingSpinner">
            <i class="fas fa-spinner fa-spin"></i> Loading products...
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="products.html" class="nav-item active">
            <i class="fas fa-th"></i>
            <span>Products</span>
        </a>
        <a href="contact.html" class="nav-item">
            <i class="fas fa-envelope"></i>
            <span>Contact</span>
        </a>
        <a href="https://wa.me/260572523334" class="nav-item" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp</span>
        </a>
    </div>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/260572523334?text=Hello%20MR%20BD%20Pulse%20Mobile,%20I'm%20interested%20in%20your%20products" class="floating-wa" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Scroll to Top Button -->
    <button class="scroll-top" id="scrollTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <footer>
        <p>MR BD Pulse Mobile | Premium iPhones & Gadgets - Lusaka, Zambia</p>
        
    </footer>

    <script src="script.js"></script>
</body>
</html>
